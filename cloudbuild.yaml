steps:
  # Étape 1: Construire l'image Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cloud-app-front:latest'
      - '.'

  # Étape 2: Pusher l'image vers Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cloud-app-front:latest'

  # Étape 3: Déployer sur Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cloud-app-front'
      - '--image=gcr.io/$PROJECT_ID/cloud-app-front:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'

  # Étape 4: Smoke tests (vérifie que l'app répond)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'smoke-test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        URL=$(gcloud run services describe cloud-app-front --region=europe-west1 --format="value(status.url)")
        echo "Service URL: ${URL}"
        curl -f --retry 5 --retry-delay 2 "${URL}"

images:
  - 'gcr.io/$PROJECT_ID/cloud-app-front:latest'

timeout: '1800s'
